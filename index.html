<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MigAvatar 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: white; min-height: 100vh; }
.container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
header { padding: 12px; background: linear-gradient(135deg, #6366f1, #8b5cf6); text-align: center; }
h1 { font-size: 18px; font-weight: 800; }
.langs { display: flex; gap: 6px; padding: 10px; background: #16162a; }
.lang { flex: 1; padding: 8px; background: #2d2d4a; border: 2px solid transparent; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; color: #888; }
.lang.active { border-color: #6366f1; color: white; }

.avatar-box { flex: 1; background: linear-gradient(180deg, #1a1a2e, #2d2d4a); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; min-height: 350px; }
.bubble { background: white; color: #1a1a2e; padding: 10px 18px; border-radius: 18px; font-size: 14px; font-weight: 700; opacity: 0; transition: opacity 0.3s; margin-bottom: 15px; }
.bubble.show { opacity: 1; }
.bubble::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border: 8px solid transparent; border-top-color: white; border-bottom: 0; }

.person-box { position: relative; width: 140px; height: 260px; }

/* HEAD */
.head { position: absolute; width: 60px; height: 60px; background: linear-gradient(135deg, #a78bfa, #6366f1); border-radius: 50%; left: 50%; top: 0; transform: translateX(-50%); box-shadow: 0 4px 20px rgba(99,102,241,0.5); }
.head::before { content: ''; position: absolute; width: 20px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%; top: 8px; left: 10px; }
.eye { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; top: 22px; }
.eye.l { left: 14px; }
.eye.r { right: 14px; }
.eye::after { content: ''; position: absolute; width: 5px; height: 5px; background: #1a1a2e; border-radius: 50%; top: 3px; left: 3px; }
.mouth { position: absolute; width: 16px; height: 8px; border: 2px solid white; border-top: none; border-radius: 0 0 10px 10px; bottom: 14px; left: 50%; transform: translateX(-50%); }

/* NECK */
.neck { position: absolute; width: 20px; height: 15px; background: #6366f1; left: 50%; top: 55px; transform: translateX(-50%); }

/* BODY */
.body { position: absolute; width: 70px; height: 90px; background: linear-gradient(180deg, #6366f1, #4f46e5); border-radius: 15px 15px 8px 8px; left: 50%; top: 65px; transform: translateX(-50%); box-shadow: inset -10px 0 20px rgba(0,0,0,0.2); }

/* ARMS */
.arm { position: absolute; width: 20px; height: 80px; background: linear-gradient(180deg, #6366f1, #4f46e5); border-radius: 12px; top: 70px; }
.arm.l { left: 12px; transform-origin: top center; animation: armL 2s ease-in-out infinite; }
.arm.r { right: 12px; transform-origin: top center; animation: armR 2s ease-in-out infinite; }
@keyframes armL { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(-15deg)} }
@keyframes armR { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(15deg)} }

/* HANDS */
.hand { position: absolute; width: 24px; height: 24px; background: linear-gradient(135deg, #c4b5fd, #a78bfa); border-radius: 50%; box-shadow: 0 3px 10px rgba(139,92,246,0.5); }
.hand.l { left: 8px; top: 140px; animation: handL 2s ease-in-out infinite; }
.hand.r { right: 8px; top: 140px; animation: handR 2s ease-in-out infinite; }
@keyframes handL { 0%,100%{transform:translate(0,0)} 30%{transform:translate(-8px,-12px)} }
@keyframes handR { 0%,100%{transform:translate(0,0)} 30%{transform:translate(8px,-12px)} }

/* FINGERS */
.finger { position: absolute; width: 5px; height: 14px; background: linear-gradient(180deg, #c4b5fd, #a78bfa); border-radius: 4px; }
.hand.l .finger:nth-child(1) { top: -10px; left: 2px; transform: rotate(-10deg); }
.hand.l .finger:nth-child(2) { top: -12px; left: 9px; }
.hand.l .finger:nth-child(3) { top: -10px; left: 16px; transform: rotate(10deg); }
.hand.r .finger:nth-child(1) { top: -10px; left: 2px; transform: rotate(-10deg); }
.hand.r .finger:nth-child(2) { top: -12px; left: 9px; }
.hand.r .finger:nth-child(3) { top: -10px; left: 16px; transform: rotate(10deg); }

/* HIPS & LEGS */
.hips { position: absolute; width: 60px; height: 30px; background: #4f46e5; border-radius: 8px 8px 12px 12px; left: 50%; top: 150px; transform: translateX(-50%); }
.leg { position: absolute; width: 24px; height: 75px; background: linear-gradient(180deg, #4338ca, #3730a3); border-radius: 8px; top: 175px; }
.leg.l { left: 38px; }
.leg.r { right: 38px; }
.foot { position: absolute; width: 30px; height: 15px; background: #3730a3; border-radius: 6px 6px 8px 8px; top: 245px; }
.foot.l { left: 35px; }
.foot.r { right: 35px; }

/* SHADOW */
.shadow { position: absolute; width: 80px; height: 15px; background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%); bottom: -10px; left: 50%; transform: translateX(-50%); animation: shadowAnim 2s ease-in-out infinite; }
@keyframes shadowAnim { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(0.85)} }

/* SIGN TEXT */
.sign-letter { font-size: 28px; font-weight: 800; color: #a78bfa; margin-top: 10px; text-shadow: 0 0 15px rgba(167,139,250,0.8); min-height: 35px; }

.status { text-align: center; padding: 8px; font-size: 12px; color: #6366f1; }

.chat-area { background: #16162a; padding: 12px; border-radius: 18px 18px 0 0; }
.input-row { display: flex; gap: 8px; margin-bottom: 8px; }
input { flex: 1; padding: 12px 16px; border: 2px solid #3d3d5c; border-radius: 22px; background: #1a1a2e; color: white; font-size: 14px; outline: none; }
input:focus { border-color: #6366f1; }
input::placeholder { color: #666; }
.btn { padding: 12px 18px; border: none; border-radius: 22px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-send { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
.btn-voice { background: #10b981; color: white; width: 100%; margin-top: 8px; }
.messages { max-height: 80px; overflow-y: auto; margin-bottom: 8px; }
.msg { padding: 8px 14px; border-radius: 14px; margin-bottom: 5px; font-size: 12px; }
.msg-me { background: linear-gradient(135deg, #6366f1, #8b5cf6); margin-left: auto; max-width: 75%; }
.msg-them { background: #2d2d4a; margin-right: auto; max-width: 75%; }
.recording { display: none; align-items: center; justify-content: center; gap: 6px; padding: 8px; background: #fef2f2; border-radius: 10px; color: #dc2626; font-size: 12px; margin-top: 6px; }
.recording.show { display: flex; }
.rec-dot { width: 8px; height: 8px; background: #dc2626; border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="container">
<header><h1>✋ MigAvatar 3D</h1></header>

<div class="langs">
<div class="lang active" id="langPL" onclick="setLang('pl-PL')">🇵🇱 Polski</div>
<div class="lang" id="langEN" onclick="setLang('en-US')">🇺🇸 English</div>
<div class="lang" id="langDE" onclick="setLang('de-DE')">🇩🇪 Deutsch</div>
</div>

<div class="avatar-box">
<div class="bubble" id="bubble">Cześć!</div>

<div class="person-box">
<!-- HEAD -->
<div class="head">
  <div class="eye l"></div>
  <div class="eye r"></div>
  <div class="mouth"></div>
</div>
<!-- NECK -->
<div class="neck"></div>
<!-- BODY -->
<div class="body"></div>
<!-- ARMS -->
<div class="arm l" id="armL"></div>
<div class="arm r" id="armR"></div>
<!-- HANDS -->
<div class="hand l" id="handL">
  <div class="finger"></div>
  <div class="finger"></div>
  <div class="finger"></div>
</div>
<div class="hand r" id="handR">
  <div class="finger"></div>
  <div class="finger"></div>
  <div class="finger"></div>
</div>
<!-- HIPS & LEGS -->
<div class="hips"></div>
<div class="leg l"></div>
<div class="leg r"></div>
<div class="foot l"></div>
<div class="foot r"></div>
<!-- SHADOW -->
<div class="shadow"></div>
</div>

<div class="sign-letter" id="signLetter"></div>
</div>

<div class="status" id="status">Gotowy</div>

<div class="chat-area">
<div class="messages" id="msgs"></div>
<div class="input-row">
<input type="text" id="msgInput" placeholder="Wpisz wiadomość..." maxlength="60">
<button class="btn btn-send" onclick="sendMsg()">✋</button>
</div>
<button class="btn btn-voice" onclick="toggleMic()">🎤 Nagraj głos</button>
<div class="recording" id="recInd"><span class="rec-dot"></span> Nagrywam...</div>
</div>
</div>

<script>
var POSES = {
A:{hL:{x:-10,y:-10},hR:{x:10,y:-10},aL:20,aR:-20},
B:{hL:{x:0,y:-18},hR:{x:0,y:5},aL:0,aR:0},
C:{hL:{x:12,y:0},hR:{x:-12,y:0},aL:-15,aR:15},
D:{hL:{x:0,y:-8},hR:{x:0,y:-5},aL:10,aR:-10},
E:{hL:{x:8,y:5},hR:{x:-8,y:5},aL:-5,aR:5},
F:{hL:{x:-5,y:-18},hR:{x:0,y:-5},aL:5,aR:-5},
G:{hL:{x:-18,y:5},hR:{x:-12,y:5},aL:30,aR:-15},
H:{hL:{x:-5,y:0},hR:{x:-5,y:0},aL:15,aR:-15},
I:{hL:{x:8,y:8},hR:{x:-8,y:-8},aL:-25,aR:25},
J:{hL:{x:8,y:0},hR:{x:-8,y:-18},aL:-30,aR:30},
K:{hL:{x:-5,y:-5},hR:{x:-5,y:-8},aL:10,aR:-10},
L:{hL:{x:0,y:-22},hR:{x:-5,y:8},aL:-5,aR:5},
M:{hL:{x:8,y:5},hR:{x:-8,y:5},aL:0,aR:0},
N:{hL:{x:8,y:5},hR:{x:-8,y:5},aL:0,aR:0},
O:{hL:{x:12,y:0},hR:{x:-12,y:0},aL:-10,aR:10},
P:{hL:{x:-18,y:12},hR:{x:-5,y:-18},aL:40,aR:-40},
Q:{hL:{x:-12,y:12},hR:{x:-5,y:-12},aL:35,aR:-35},
R:{hL:{x:-5,y:-5},hR:{x:-5,y:-5},aL:15,aR:-15},
S:{hL:{x:8,y:6},hR:{x:-8,y:6},aL:0,aR:0},
T:{hL:{x:8,y:6},hR:{x:-8,y:6},aL:0,aR:0},
U:{hL:{x:-5,y:0},hR:{x:-5,y:0},aL:0,aR:0},
V:{hL:{x:-5,y:-5},hR:{x:-5,y:-5},aL:0,aR:0},
W:{hL:{x:-5,y:-8},hR:{x:-5,y:-8},aL:0,aR:0},
X:{hL:{x:8,y:5},hR:{x:-8,y:-5},aL:5,aR:-5},
Y:{hL:{x:-22,y:5},hR:{x:22,y:5},aL:45,aR:-45},
Z:{hL:{x:8,y:5},hR:{x:-8,y:-8},aL:0,aR:-20}
};

var handL = document.getElementById('handL');
var handR = document.getElementById('handR');
var armL = document.getElementById('armL');
var armR = document.getElementById('armR');
var bubble = document.getElementById('bubble');
var signLetter = document.getElementById('signLetter');
var msgInput = document.getElementById('msgInput');
var msgs = document.getElementById('msgs');
var statusEl = document.getElementById('status');
var recInd = document.getElementById('recInd');
var lang = 'pl-PL';
var rec = null;
var isRec = false;

function setLang(l) {
lang = l;
document.getElementById('langPL').className = 'lang' + (l==='pl-PL'?' active':'');
document.getElementById('langEN').className = 'lang' + (l==='en-US'?' active':'');
document.getElementById('langDE').className = 'lang' + (l==='de-DE'?' active':'');
if (rec) rec.lang = l;
}

function applyPose(pose) {
handL.style.transform = 'translate(' + pose.hL.x + 'px,' + pose.hL.y + 'px)';
handR.style.transform = 'translate(' + pose.hR.x + 'px,' + pose.hR.y + 'px)';
armL.style.transform = 'rotate(' + pose.aL + 'deg)';
armR.style.transform = 'rotate(' + pose.aR + 'deg)';
}

function showSign(text) {
var chars = text.toUpperCase().split('').filter(function(c){return /[A-Z]/.test(c)});
if (!chars.length) return;
var i = 0;
signLetter.textContent = '';
function next() {
if (i >= chars.length) {
signLetter.textContent = '';
applyPose(POSES['A']);
return;
}
var pose = POSES[chars[i]] || POSES['A'];
applyPose(pose);
signLetter.textContent = chars[i];
i++;
setTimeout(next, 700);
}
next();
}

function addMsg(text, me) {
var d = document.createElement('div');
d.className = 'msg ' + (me ? 'msg-me' : 'msg-them');
d.textContent = text;
msgs.appendChild(d);
msgs.scrollTop = msgs.scrollHeight;
}

function sendMsg() {
var text = msgInput.value.trim();
if (!text) return;
addMsg(text, true);
bubble.textContent = text;
bubble.classList.add('show');
msgInput.value = '';
setTimeout(function(){bubble.classList.remove('show')}, 2500);

try {
var u = new SpeechSynthesisUtterance(text);
u.lang = lang;
u.rate = 0.9;
speechSynthesis.speak(u);
} catch(e) {}

showSign(text);
statusEl.textContent = 'Pokazuję Migi...';
setTimeout(function() {
var resps = ['Rozumiem!', 'Ok!', 'Dzięki!', 'Jasne!'];
addMsg(resps[Math.floor(Math.random()*resps.length)], false);
statusEl.textContent = 'Gotowy';
}, 1500);
}

function toggleMic() {
try {
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!rec) {
rec = new SR();
rec.lang = lang;
rec.onresult = function(e) {
msgInput.value = e.results[0][0].transcript.toUpperCase();
sendMsg();
};
rec.onerror = function(e) {
if (e.error !== 'no-speech') statusEl.textContent = 'Błąd: ' + e.error;
stopMic();
};
rec.onend = stopMic;
}
if (isRec) { stopMic(); }
else {
rec.start();
isRec = true;
recInd.classList.add('show');
statusEl.textContent = 'Słucham...';
}
} catch(e) { statusEl.textContent = 'Mikrofon niedostępny'; }
}

function stopMic() {
isRec = false;
recInd.classList.remove('show');
try { rec.stop(); } catch(e) {}
statusEl.textContent = 'Gotowy';
}

msgInput.addEventListener('keypress', function(e) {
if (e.key === 'Enter') sendMsg();
});

setTimeout(function() {
bubble.textContent = 'Cześć! Wpisz coś!';
bubble.classList.add('show');
setTimeout(function(){bubble.classList.remove('show')}, 3000);
}, 500);
</script>
</body>
</html>

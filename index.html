<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MigAvatar - E-Tłumacz Migowego</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #1a1a2e; color: white; min-height: 100vh; overflow: hidden; }
.container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
header { padding: 12px 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); text-align: center; }
h1 { font-size: 20px; font-weight: 800; }
.sub { font-size: 11px; opacity: 0.9; }
.avatar-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: linear-gradient(180deg, #1a1a2e 0%, #2d2d4a 100%); }
.avatar-area { position: relative; width: 200px; height: 280px; }
.speech-bubble { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: white; color: #1a1a2e; padding: 10px 18px; border-radius: 18px; font-size: 15px; font-weight: 600; max-width: 85%; text-align: center; opacity: 0; transition: opacity 0.3s; z-index: 10; }
.speech-bubble.show { opacity: 1; }
.speech-bubble::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border: 8px solid transparent; border-top-color: white; border-bottom: 0; }
.person { width: 100%; height: 100%; }
.chat-area { background: #16162a; padding: 12px; border-radius: 18px 18px 0 0; }
.input-row { display: flex; gap: 8px; margin-bottom: 8px; }
input { flex: 1; padding: 12px 16px; border: 2px solid #3d3d5c; border-radius: 22px; background: #1a1a2e; color: white; font-size: 14px; outline: none; }
input:focus { border-color: #6366f1; }
input::placeholder { color: #666; }
.btn { padding: 12px 18px; border: none; border-radius: 22px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-send { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
.btn-voice { background: #10b981; color: white; width: 100%; margin-top: 8px; }
.messages { max-height: 120px; overflow-y: auto; margin-bottom: 8px; }
.msg { padding: 8px 14px; border-radius: 14px; margin-bottom: 6px; font-size: 13px; }
.msg-me { background: linear-gradient(135deg, #6366f1, #8b5cf6); margin-left: auto; max-width: 75%; }
.msg-them { background: #2d2d4a; margin-right: auto; max-width: 75%; }
.langs { display: flex; gap: 6px; padding: 10px 12px; background: #16162a; }
.lang { flex: 1; padding: 8px; background: #2d2d4a; border: 2px solid transparent; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; color: #888; }
.lang.active { border-color: #6366f1; color: white; background: #3d3d5c; }
.status { text-align: center; padding: 6px; font-size: 11px; color: #555; }
.recording { display: none; align-items: center; justify-content: center; gap: 6px; padding: 8px; background: #fef2f2; border-radius: 10px; color: #dc2626; font-size: 12px; margin-top: 6px; }
.recording.show { display: flex; }
.rec-dot { width: 8px; height: 8px; background: #dc2626; border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="container">
<header>
<h1>✋ MigAvatar</h1>
<p class="sub">E-Tłumacz Polskiego Języka Migowego</p>
</header>

<div class="langs">
<div class="lang active" id="langPL" onclick="setLang('pl-PL')">🇵🇱 Polski</div>
<div class="lang" id="langEN" onclick="setLang('en-US')">🇺🇸 English</div>
<div class="lang" id="langDE" onclick="setLang('de-DE')">🇩🇪 Deutsch</div>
</div>

<div class="avatar-container">
<div class="avatar-area">
<div class="speech-bubble" id="bubble">Cześć!</div>

<svg class="person" viewBox="0 0 200 280" id="person">
<!-- Head -->
<circle cx="100" cy="40" r="28" fill="#6366f1"/>
<!-- Eyes -->
<circle cx="92" cy="36" r="4" fill="white"/>
<circle cx="108" cy="36" r="4" fill="white"/>
<!-- Smile -->
<path d="M94 48 Q100 54 106 48" stroke="white" stroke-width="2" fill="none"/>
<!-- Body -->
<path d="M100 68 L100 160" stroke="#6366f1" stroke-width="28" stroke-linecap="round"/>
<!-- Left Arm -->
<path d="M75 85 L60 120 L45 100" stroke="#6366f1" stroke-width="16" stroke-linecap="round" fill="none"/>
<!-- Right Arm -->
<path d="M125 85 L140 120 L155 100" stroke="#6366f1" stroke-width="16" stroke-linecap="round" fill="none"/>
<!-- Left Hand -->
<circle cx="40" cy="95" r="14" fill="#8b5cf6" id="handL"/>
<!-- Right Hand -->
<circle cx="160" cy="95" r="14" fill="#8b5cf6" id="handR"/>
<!-- Left Leg -->
<path d="M85 160 L75 250" stroke="#6366f1" stroke-width="18" stroke-linecap="round"/>
<!-- Right Leg -->
<path d="M115 160 L125 250" stroke="#6366f1" stroke-width="18" stroke-linecap="round"/>
</svg>
</div>
</div>

<div class="status" id="status">Wpisz wiadomość</div>

<div class="chat-area">
<div class="messages" id="msgs"></div>
<div class="input-row">
<input type="text" id="msgInput" placeholder="Wpisz wiadomość..." maxlength="80">
<button class="btn btn-send" onclick="sendMsg()">✋</button>
</div>
<button class="btn btn-voice" onclick="toggleMic()">🎤 Nagraj głos</button>
<div class="recording" id="recInd"><span class="rec-dot"></span> Nagrywam...</div>
</div>
</div>

<script>
// Sign poses - hand positions A-Z
var POSES = {
A:{lX:35,lY:90,rX:165,rY:95},
B:{lX:35,lY:75,rX:165,rY:95},
C:{lX:50,lY:80,rX:165,rY:95},
D:{lX:35,lY:80,rX:165,rY:85},
E:{lX:50,lY:90,rX:165,rY:95},
F:{lX:30,lY:75,rX:165,rY:85},
G:{lX:25,lY:95,rX:165,rY:95},
H:{lX:40,lY:95,rX:165,rY:95},
I:{lX:50,lY:100,rX:165,rY:90},
J:{lX:50,lY:90,rX:165,rY:80},
K:{lX:40,lY:90,rX:165,rY:85},
L:{lX:35,lY:70,rX:165,rY:100},
M:{lX:50,lY:95,rX:165,rY:95},
N:{lX:50,lY:95,rX:165,rY:95},
O:{lX:50,lY:80,rX:165,rY:95},
P:{lX:25,lY:105,rX:165,rY:80},
Q:{lX:40,lY:105,rX:165,rY:85},
R:{lX:40,lY:90,rX:165,rY:85},
S:{lX:50,lY:100,rX:165,rY:100},
T:{lX:50,lY:100,rX:165,rY:100},
U:{lX:40,lY:90,rX:165,rY:90},
V:{lX:40,lY:85,rX:165,rY:85},
W:{lX:40,lY:80,rX:165,rY:80},
X:{lX:50,lY:95,rX:165,rY:90},
Y:{lX:25,lY:100,rX:175,rY:100},
Z:{lX:50,lY:95,rX:165,rY:85}
};

var handL = document.getElementById('handL');
var handR = document.getElementById('handR');
var bubble = document.getElementById('bubble');
var msgInput = document.getElementById('msgInput');
var msgs = document.getElementById('msgs');
var status = document.getElementById('status');
var recInd = document.getElementById('recInd');
var lang = 'pl-PL';
var rec = null;
var isRec = false;

function setLang(l) {
lang = l;
document.getElementById('langPL').className = 'lang' + (l==='pl-PL'?' active':'');
document.getElementById('langEN').className = 'lang' + (l==='en-US'?' active':'');
document.getElementById('langDE').className = 'lang' + (l==='de-DE'?' active':'');
if (rec) rec.lang = l;
}

function animatePose(pose) {
handL.setAttribute('cx', pose.lX);
handL.setAttribute('cy', pose.lY);
handR.setAttribute('cx', pose.rX);
handR.setAttribute('cy', pose.rY);
}

function showSign(text) {
var chars = text.toUpperCase().split('').filter(function(c){return /[A-Z]/.test(c)});
if (!chars.length) return;
var i = 0;
function next() {
if (i >= chars.length) return;
var pose = POSES[chars[i]] || POSES['A'];
animatePose(pose);
i++;
setTimeout(next, 700);
}
next();
}

function addMsg(text, me) {
var d = document.createElement('div');
d.className = 'msg ' + (me ? 'msg-me' : 'msg-them');
d.textContent = text;
msgs.appendChild(d);
msgs.scrollTop = msgs.scrollHeight;
}

function sendMsg() {
var text = msgInput.value.trim();
if (!text) return;
addMsg(text, true);
bubble.textContent = text;
bubble.classList.add('show');
msgInput.value = '';
setTimeout(function(){bubble.classList.remove('show')}, 2500);

// Speak
try {
var u = new SpeechSynthesisUtterance(text);
u.lang = lang;
u.rate = 0.9;
speechSynthesis.speak(u);
} catch(e) {}

// Show sign
showSign(text);

// Simulate response
status.textContent = 'Avatar pokazuje Migi...';
setTimeout(function() {
var resps = ['Rozumiem!', 'Ok!', 'Dzięki!', 'Jasne!'];
addMsg(resps[Math.floor(Math.random()*resps.length)], false);
status.textContent = 'Gotowy';
}, 1500);
}

function toggleMic() {
try {
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!rec) {
rec = new SR();
rec.lang = lang;
rec.onresult = function(e) {
msgInput.value = e.results[0][0].transcript.toUpperCase();
sendMsg();
};
rec.onerror = function(e) {
if (e.error !== 'no-speech') status.textContent = 'Błąd: ' + e.error;
stopMic();
};
rec.onend = stopMic;
}
if (isRec) {
stopMic();
} else {
rec.start();
isRec = true;
recInd.classList.add('show');
status.textContent = 'Słucham... mów!';
}
} catch(e) {
status.textContent = 'Mikrofon niedostępny';
}
}

function stopMic() {
isRec = false;
recInd.classList.remove('show');
try { rec.stop(); } catch(e) {}
status.textContent = 'Gotowy';
}

msgInput.addEventListener('keypress', function(e) {
if (e.key === 'Enter') sendMsg();
});

// Hello animation
setTimeout(function() {
bubble.textContent = 'Cześć! Wpisz coś!';
bubble.classList.add('show');
setTimeout(function(){bubble.classList.remove('show')}, 3000);
}, 500);
</script>
</body>
</html>

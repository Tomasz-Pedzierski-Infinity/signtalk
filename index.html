<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignTalk Test</title>
</head>
<body style="font-family: Arial; padding: 20px;">
<h1>✋ SignTalk - TEST TTS</h1>

<p>Wpisz tekst:</p>
<input type="text" id="text" placeholder="Napisz coś..." style="width: 100%; padding: 15px; font-size: 20px; border: 2px solid #6366f1; border-radius: 8px;">
<br><br>

<button onclick="speak()" style="width: 100%; padding: 20px; font-size: 24px; background: #10b981; color: white; border: none; border-radius: 10px; cursor: pointer;">
🔊 KLIKNIJ ABY USŁYSZEĆ
</button>

<p id="status" style="margin-top: 20px; color: green;"></p>

<script>
function speak() {
  var text = document.getElementById('text').value;
  if (!text) {
    document.getElementById('status').innerHTML = '❌ WPISZ COŚ!';
    document.getElementById('status').style.color = 'red';
    return;
  }
  
  document.getElementById('status').innerHTML = '🔊 Mówię...';
  document.getElementById('status').style.color = 'green';
  
  // Cancel any current speech
  speechSynthesis.cancel();
  
  // Create and speak
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'pl-PL';
  utter.rate = 0.9;
  
  utter.onend = function() {
    document.getElementById('status').innerHTML = '✓ Skończyłem!';
  };
  
  utter.onerror = function(e) {
    document.getElementById('status').innerHTML = '❌ Błąd: ' + e.error;
    document.getElementById('status').style.color = 'red';
  };
  
  speechSynthesis.speak(utter);
}

// Also try speaking on load
window.onload = function() {
  setTimeout(function() {
    var utter = new SpeechSynthesisUtterance('Cześć! Mam głos!');
    utter.lang = 'pl-PL';
    speechSynthesis.speak(utter);
  }, 1000);
};
</script>
</body>
</html>
